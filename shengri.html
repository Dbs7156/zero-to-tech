<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 生日惊喜 · 烟花与祝福</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0a0f2a 0%, #1b1f3a 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ===== 星空背景 ===== */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration, 3s) ease-in-out infinite alternate;
            box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.3);
            width: var(--size, 4px);
            height: var(--size, 4px);
            top: var(--top, 10%);
            left: var(--left, 20%);
            opacity: 0.7;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== 主卡片 ===== */
        .birthday-card {
            position: relative;
            z-index: 10;
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 70px 70px 70px 70px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 150, 0.15) inset;
            padding: 40px 35px 50px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(255, 215, 150, 0.15);
        }

        .card-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .emoji-big {
            font-size: 70px;
            line-height: 1;
            filter: drop-shadow(0 8px 20px rgba(255, 200, 100, 0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fddb92, #f9b84a, #fddb92);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            text-shadow: 0 0 30px rgba(250, 180, 50, 0.2);
            margin-bottom: 0px;
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .friend-name {
            font-size: 2.0rem;
            font-weight: 700;
            color: #ffd78a;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.4);
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f9e0b0, #f9b84a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: -8px;
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f9b84a, transparent);
            border-radius: 100%;
            margin: 0px 0 8px;
        }

        .main-message {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #f5ede4;
            padding: 15px 20px;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 50px;
            backdrop-filter: blur(2px);
            border-left: 3px solid #f9b84a;
            border-right: 3px solid #f9b84a;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .main-message span {
            display: inline-block;
            background: linear-gradient(135deg, #f9d976, #f39c12);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
        }

        /* ===== 🎁 礼物按钮 ===== */
        .gift-button {
            margin: 10px 0 6px;
            font-size: 3.8rem;
            background: rgba(255, 215, 150, 0.03);
            border: 2px solid rgba(255, 215, 150, 0.2);
            border-radius: 120px;
            padding: 16px 40px;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 0 30px rgba(255, 200, 100, 0.1);
            backdrop-filter: blur(6px);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            line-height: 1;
            letter-spacing: 2px;
            color: #f5e3c1;
            font-weight: 500;
            font-size: 1.8rem;
            background: rgba(255, 215, 150, 0.04);
        }

        .gift-button:hover {
            transform: scale(1.04) translateY(-4px);
            background: rgba(255, 215, 150, 0.12);
            border-color: #f9b84a;
            box-shadow: 0 0 50px rgba(255, 200, 100, 0.3);
        }

        .gift-button:active {
            transform: scale(0.94);
        }

        .gift-button span {
            font-size: 2.8rem;
            line-height: 1;
        }

        /* 底部小字 */
        .footer-note {
            margin-top: 18px;
            color: #b9ad9a;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            border-top: 1px solid rgba(255, 215, 150, 0.08);
            padding-top: 18px;
            width: 70%;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            font-weight: 300;
        }

        .footer-note i {
            font-style: normal;
            background: rgba(255, 215, 150, 0.06);
            padding: 2px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 215, 150, 0.05);
        }

        /* ===== 烟花 Canvas ===== */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
        }

        /* ===== 生日快乐浮动文字 ===== */
        .happy-birthday-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffe484;
            text-shadow: 0 0 30px #f9b84a, 0 0 60px #f9b84a, 0 0 100px #ff9900;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: none;
            font-family: 'Segoe UI', 'Poppins', cursive;
            letter-spacing: 8px;
            white-space: nowrap;
            background: linear-gradient(135deg, #ffe484, #f9b84a, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 200, 50, 0.6));
        }

        .happy-birthday-text.show {
            animation: popAndFade 2.2s cubic-bezier(0.2, 0.9, 0.4, 1.2) forwards;
        }

        @keyframes popAndFade {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.4) rotate(-6deg);
            }
            25% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.3) rotate(2deg);
            }
            45% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
            }
            70% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1) rotate(-1deg);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -60%) scale(1) rotate(0deg);
            }
        }

        /* 小型响应式 */
        @media (max-width: 550px) {
            .birthday-card { padding: 30px 18px 35px; border-radius: 40px; }
            h1 { font-size: 2.2rem; }
            .main-message { font-size: 1.1rem; padding: 14px 12px; }
            .friend-name { font-size: 1.7rem; }
            .emoji-big { font-size: 58px; }
            .gift-button { font-size: 1.5rem; padding: 14px 26px; }
            .gift-button span { font-size: 2.2rem; }
            .happy-birthday-text { font-size: 2.8rem; letter-spacing: 4px; white-space: normal; }
        }

        @media (max-width: 400px) {
            .birthday-card { padding: 20px 12px 25px; border-radius: 30px; }
            h1 { font-size: 1.8rem; }
            .main-message { font-size: 1rem; padding: 12px 8px; }
            .happy-birthday-text { font-size: 2.2rem; letter-spacing: 2px; }
        }

        /* 其他点缀 */
        .glow-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #f9d976;
            border-radius: 50%;
            filter: blur(4px);
            opacity: 0.2;
            pointer-events: none;
            z-index: 1;
            animation: drift 14s linear infinite;
        }

        @keyframes drift {
            0% { transform: translateY(-10vh) translateX(0px) scale(1); opacity: 0.1; }
            50% { opacity: 0.3; }
            100% { transform: translateY(110vh) translateX(40px) scale(0.6); opacity: 0; }
        }

        ::-webkit-scrollbar { width: 6px; background: #1a1e32; }
        ::-webkit-scrollbar-thumb { background: #f9b84a; border-radius: 12px; }
    </style>
</head>
<body>

    <!-- 星空容器 -->
    <div class="stars" id="starsContainer"></div>

    <!-- 浮动光点 -->
    <div class="glow-dot" style="left: 10%; animation-delay: 0s; width: 10px; height: 10px; filter: blur(6px);"></div>
    <div class="glow-dot" style="left: 30%; animation-delay: 4s; width: 8px; height: 8px; filter: blur(5px);"></div>
    <div class="glow-dot" style="left: 70%; animation-delay: 7s; width: 14px; height: 14px; filter: blur(8px);"></div>
    <div class="glow-dot" style="left: 90%; animation-delay: 2s; width: 6px; height: 6px; filter: blur(4px);"></div>

    <!-- 🎆 烟花 Canvas -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- 🎂 浮动“生日快乐”文字 (由JS控制) -->
    <div id="happyBirthdayText" class="happy-birthday-text">✨ 生日快乐 ✨</div>

    <!-- ===== 主卡片 ===== -->
    <div class="birthday-card">
        <div class="card-inner">
            <div class="emoji-big">🎉</div>
            <h1>生日快乐</h1>
            <div class="friend-name">✨ 我的朋友 ✨</div>
            <div class="divider"></div>
            <div class="main-message">
                🥳 愿你的新一岁<br>
                <span>充满惊喜 · 笑颜常开</span><br>
                所有的美好都 <strong>如期而至</strong> 🎂
            </div>

            <!-- 🎁 点击触发烟花 + 生日快乐文字 -->
            <button class="gift-button" id="giftTrigger">
                <span>🎁</span> 点击礼物，绽放惊喜
            </button>

            <div class="footer-note">
                <i>💌 愿每一天都闪闪发光</i>
                <i>🌠 最好的祝福送给你</i>
            </div>
            <div style="margin-top: 6px; font-size: 0.8rem; color: #c9bbaa; letter-spacing: 2px; background: rgba(255,215,150,0.03); padding: 4px 20px; border-radius: 40px; border: 1px solid rgba(255,215,150,0.03);">
                ⭐ 点击礼物 · 烟花为你绽放 ⭐
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  1. 生成星空
        // ============================================================
        (function createStars() {
            const container = document.getElementById('starsContainer');
            const count = 140;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.floor(Math.random() * 5) + 2;
                star.style.setProperty('--size', size + 'px');
                star.style.setProperty('--top', Math.random() * 100 + '%');
                star.style.setProperty('--left', Math.random() * 100 + '%');
                star.style.setProperty('--duration', (Math.random() * 3 + 2).toFixed(2) + 's');
                star.style.animationDelay = (Math.random() * 5).toFixed(2) + 's';
                star.style.opacity = (Math.random() * 0.6 + 0.3).toFixed(2);
                container.appendChild(star);
            }
        })();

        // ============================================================
        //  2. 烟花系统 (Canvas)
        // ============================================================
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        let W, H;

        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 粒子池
        let particles = [];
        const GRAVITY = 0.08;
        const FADE = 0.96;

        class Particle {
            constructor(x, y, color, vx, vy, radius, life) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
                this.life = life;
                this.maxLife = life;
                this.alpha = 1;
            }

            update() {
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 1;
                this.alpha = Math.max(0, this.life / this.maxLife);
                this.radius *= 0.995;
                return this.life > 0 && this.radius > 0.3;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha * 0.9;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.5, this.radius), 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 18;
                ctx.fill();
                ctx.restore();
            }
        }

        // ----- 生成烟花 (单次爆发) -----
        function firework(x, y, colorPalette = null) {
            const count = 180 + Math.floor(Math.random() * 120);
            const baseColor = colorPalette || [
                `hsl(${Math.random() * 60 + 20}, 90%, 60%)`,
                `hsl(${Math.random() * 60 + 20}, 85%, 70%)`,
                `hsl(${Math.random() * 60 + 20}, 95%, 50%)`,
                '#ffd966', '#f9b84a', '#ffb347', '#ff7e5f', '#feb47b'
            ];

            const colors = [];
            for (let i = 0; i < 5; i++) {
                const hue = Math.random() * 60 + 20;
                colors.push(`hsl(${hue}, 90%, 65%)`);
                colors.push(`hsl(${hue + 30}, 85%, 70%)`);
                colors.push(`hsl(${hue + 15}, 95%, 55%)`);
            }
            const finalColors = colors.length > 0 ? colors : baseColor;

            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                const vx = Math.cos(angle) * speed * (0.6 + Math.random() * 0.8);
                const vy = Math.sin(angle) * speed * (0.6 + Math.random() * 0.8);
                const radius = Math.random() * 4 + 2;
                const life = 60 + Math.floor(Math.random() * 50);
                const color = finalColors[Math.floor(Math.random() * finalColors.length)];
                particles.push(new Particle(x, y, color, vx, vy, radius, life));
            }
        }

        // 多朵烟花 (随机位置)
        function launchFireworks(count = 3) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const x = Math.random() * W * 0.6 + W * 0.2;
                    const y = Math.random() * H * 0.4 + H * 0.1;
                    const palette = [
                        `hsl(${Math.random() * 60 + 20}, 90%, 60%)`,
                        `hsl(${Math.random() * 60 + 20}, 85%, 70%)`,
                        `hsl(${Math.random() * 60 + 20}, 95%, 50%)`,
                        '#ffd966', '#f9b84a', '#ffb347', '#ff7e5f', '#feb47b'
                    ];
                    firework(x, y, palette);
                }, i * 200);
            }
        }

        // 额外小烟花 (从底部升空效果) 这里直接在空中爆
        function extraBurst() {
            for (let i = 0; i < 2; i++) {
                setTimeout(() => {
                    const x = Math.random() * W * 0.8 + W * 0.1;
                    const y = Math.random() * H * 0.5 + H * 0.15;
                    firework(x, y);
                }, i * 300 + 100);
            }
        }

        // 动画循环
        function animateParticles() {
            ctx.clearRect(0, 0, W, H);
            particles = particles.filter(p => p.update());
            particles.forEach(p => p.draw(ctx));
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ============================================================
        //  3. 显示“生日快乐”文字 (带动画)
        // ============================================================
        const birthdayText = document.getElementById('happyBirthdayText');

        function showBirthdayText() {
            // 移除旧类重新触发动画
            birthdayText.classList.remove('show');
            // 强制回流
            void birthdayText.offsetWidth;
            birthdayText.classList.add('show');

            // 3秒后移除类，以便下次点击重新触发
            setTimeout(() => {
                birthdayText.classList.remove('show');
            }, 2500);
        }

        // ============================================================
        //  4. 点击礼物 → 烟花 + 生日快乐文字
        // ============================================================
        const giftBtn = document.getElementById('giftTrigger');

        giftBtn.addEventListener('click', function(e) {
            // 按钮微反馈
            this.style.transform = 'scale(0.92)';
            setTimeout(() => { this.style.transform = ''; }, 150);

            // 1) 烟花 (多朵)
            launchFireworks(4);
            // 额外再补两朵
            setTimeout(() => { launchFireworks(3); }, 400);
            setTimeout(() => { extraBurst(); }, 700);

            // 2) 显示 生日快乐 文字
            showBirthdayText();

            // 3) 小彩蛋：在控制台输出
            console.log('🎁 生日快乐！烟花为你绽放！');
        });

        // ============================================================
        //  5. 自动演示 (页面加载后延迟触发一次, 展示效果)
        // ============================================================
        window.addEventListener('load', function() {
            setTimeout(() => {
                // 自动点击礼物效果 (让用户看到惊喜)
                giftBtn.click();
            }, 600);
        });

        // 额外: 点击页面任意位置也可以触发小烟花 (但保留礼物主要触发)
        document.addEventListener('click', function(e) {
            // 但如果点击的是礼物按钮本身，已经触发了，避免重复
            if (e.target.closest('#giftTrigger')) return;
            // 随机小烟花 (点缀)
            if (Math.random() > 0.6) {
                const x = e.clientX || W / 2;
                const y = e.clientY || H / 2;
                firework(x, y, ['#ffd966', '#f9b84a', '#ffb347', '#ff7e5f']);
            }
        });

        console.log('🎂 点击礼物🎁 触发烟花+生日快乐！');
        console.log('✨ 也试试点击页面其它位置，会有小惊喜 ✨');
    </script>
</body>
</html>
